<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>みみずく — ちゆの受験アプリ</title>
<meta name="theme-color" content="#EC5A76">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="みみずく">
</head>
<body>

<style>
  :root{
    --ground:#FFF7F1; --surface:#FFFFFF; --tint:#FFEEF1; --tint2:#FFF3E6;
    --ink:#3B2233; --ink-soft:#8A6B7C; --line:#F2DCE0;
    --primary:#EC5A76; --primary-deep:#D43F5E; --on-primary:#FFFFFF;
    --mint:#1EAF95; --mint-soft:#D7F3EC; --mint-ink:#0C6D5C;
    --gold:#F5A63C; --gold-soft:#FCE9CC;
    --shadow:0 10px 30px -12px rgba(59,34,51,.28);
    --shadow-sm:0 4px 14px -8px rgba(59,34,51,.30);
    --r-lg:26px; --r-md:18px; --r-sm:12px;
    --fnt-jp:"Hiragino Maru Gothic ProN","ヒラギノ丸ゴ ProN W4","Hiragino Sans","Yu Gothic UI",Meiryo,sans-serif;
    --fnt-round:"SF Pro Rounded",ui-rounded,"Hiragino Maru Gothic ProN",var(--fnt-jp);
  }
  @media (prefers-color-scheme:dark){
    :root{
      --ground:#211423; --surface:#2E1F2D; --tint:#3A2839; --tint2:#3A2E28;
      --ink:#FBEEF0; --ink-soft:#C6A6B6; --line:#432F3F;
      --primary:#FF6E88; --primary-deep:#FF90A4; --on-primary:#2A0E17;
      --mint:#37C9AE; --mint-soft:#173A36; --mint-ink:#8DEBD9;
      --gold:#F7B75E; --gold-soft:#3B2E1C;
      --shadow:0 12px 34px -14px rgba(0,0,0,.6);
      --shadow-sm:0 5px 16px -10px rgba(0,0,0,.6);
    }
  }
  :root[data-theme="dark"]{
    --ground:#211423; --surface:#2E1F2D; --tint:#3A2839; --tint2:#3A2E28;
    --ink:#FBEEF0; --ink-soft:#C6A6B6; --line:#432F3F;
    --primary:#FF6E88; --primary-deep:#FF90A4; --on-primary:#2A0E17;
    --mint:#37C9AE; --mint-soft:#173A36; --mint-ink:#8DEBD9;
    --gold:#F7B75E; --gold-soft:#3B2E1C;
    --shadow:0 12px 34px -14px rgba(0,0,0,.6);
    --shadow-sm:0 5px 16px -10px rgba(0,0,0,.6);
  }
  :root[data-theme="light"]{
    --ground:#FFF7F1; --surface:#FFFFFF; --tint:#FFEEF1; --tint2:#FFF3E6;
    --ink:#3B2233; --ink-soft:#8A6B7C; --line:#F2DCE0;
    --primary:#EC5A76; --primary-deep:#D43F5E; --on-primary:#FFFFFF;
    --mint:#1EAF95; --mint-soft:#D7F3EC; --mint-ink:#0C6D5C;
    --gold:#F5A63C; --gold-soft:#FCE9CC;
    --shadow:0 10px 30px -12px rgba(59,34,51,.28);
    --shadow-sm:0 4px 14px -8px rgba(59,34,51,.30);
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--fnt-jp); background:var(--ground); color:var(--ink);
    -webkit-font-smoothing:antialiased; line-height:1.5;
    background-image:radial-gradient(circle at 12% 8%, color-mix(in srgb, var(--primary) 10%, transparent) 0, transparent 42%),
                     radial-gradient(circle at 88% 4%, color-mix(in srgb, var(--gold) 12%, transparent) 0, transparent 40%);
    background-attachment:fixed;
  }
  .app{max-width:480px; margin:0 auto; min-height:100%; display:flex; flex-direction:column; padding:0 16px 26px}

  .hud{position:sticky; top:0; z-index:20; display:flex; align-items:center; gap:10px;
    padding:14px 4px 12px; background:linear-gradient(var(--ground) 72%, transparent)}
  .brand{display:flex; align-items:center; gap:9px; margin-right:auto; cursor:pointer; background:none;border:0;color:inherit;font-family:inherit}
  .brand b{font-family:var(--fnt-round); font-weight:800; font-size:20px; letter-spacing:.02em}
  .brand small{display:block; font-size:10px; color:var(--ink-soft); letter-spacing:.14em; margin-top:-2px}
  .pill{display:inline-flex; align-items:center; gap:5px; padding:7px 12px; border-radius:999px;
    background:var(--surface); box-shadow:var(--shadow-sm); font-family:var(--fnt-round); font-weight:800;
    font-size:14px; font-variant-numeric:tabular-nums; line-height:1}
  .pill.streak{color:var(--gold)}
  .pill.points{color:var(--primary-deep)}
  .pill svg{width:15px;height:15px}

  .card{background:var(--surface); border-radius:var(--r-lg); box-shadow:var(--shadow); padding:22px}

  .hero{position:relative; overflow:hidden; text-align:center; padding-top:12px}
  .hero .owlwrap{width:126px;height:126px;margin:2px auto 6px}
  .speech{display:inline-block; max-width:300px; margin:2px auto 0; padding:12px 16px; border-radius:18px 18px 18px 6px;
    background:var(--tint); color:var(--ink); font-weight:700; font-size:15px}
  .lvrow{display:flex; align-items:center; gap:12px; margin-top:18px}
  .lvbadge{flex:0 0 auto; width:52px;height:52px;border-radius:16px; display:grid;place-items:center;
    background:linear-gradient(140deg,var(--primary),var(--primary-deep)); color:var(--on-primary);
    font-family:var(--fnt-round); font-weight:800; line-height:1}
  .lvbadge small{display:block;font-size:9px;opacity:.85;letter-spacing:.1em}
  .lvbadge span{font-size:20px}
  .lvmeter{flex:1}
  .lvmeter .lbl{display:flex; justify-content:space-between; font-size:11px; color:var(--ink-soft); margin-bottom:5px; font-weight:700}
  .bar{height:12px;border-radius:999px;background:var(--tint);overflow:hidden}
  .bar>i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--gold),var(--primary));
    width:0; transition:width .7s cubic-bezier(.2,.9,.2,1)}

  .cta{width:100%; margin-top:18px; border:0; cursor:pointer; font-family:var(--fnt-round); font-weight:800;
    font-size:19px; color:var(--on-primary); padding:18px; border-radius:20px;
    background:linear-gradient(140deg,var(--primary),var(--primary-deep));
    box-shadow:0 12px 24px -10px color-mix(in srgb,var(--primary) 70%, transparent); letter-spacing:.02em;
    transition:transform .12s ease}
  .cta:active{transform:translateY(2px) scale(.99)}
  .cta .sub{display:block;font-size:12px;font-weight:700;opacity:.9;letter-spacing:.06em;margin-top:2px}

  .sechead{display:flex;align-items:baseline;gap:8px;margin:26px 4px 12px}
  .sechead h2{font-family:var(--fnt-round);font-weight:800;font-size:16px}
  .sechead span{font-size:11px;color:var(--ink-soft);font-weight:700;margin-left:auto}

  .subjects{display:grid; grid-template-columns:1fr 1fr; gap:12px}
  .subj{position:relative; text-align:left; border:0; cursor:pointer; font-family:inherit; color:var(--ink);
    background:var(--surface); border-radius:var(--r-md); padding:15px 15px 14px; box-shadow:var(--shadow-sm);
    display:flex; flex-direction:column; gap:10px; transition:transform .12s ease}
  .subj:active{transform:scale(.97)}
  .subj .top{display:flex;align-items:center;gap:10px}
  .subj .ic{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;flex:0 0 auto;
    font-family:var(--fnt-round);font-weight:800;font-size:17px;color:#fff}
  .subj .nm{font-weight:800;font-size:15px}
  .subj .nm em{display:block;font-style:normal;font-size:10.5px;color:var(--ink-soft);font-weight:700;margin-top:1px}
  .ear{position:absolute; top:11px; right:11px; display:inline-flex; align-items:center; gap:3px;
    background:var(--mint-soft); color:var(--mint-ink); font-size:9.5px; font-weight:800;
    padding:3px 7px; border-radius:999px; letter-spacing:.03em}
  .ear svg{width:10px;height:10px}
  .mrow{display:flex;align-items:center;gap:8px}
  .mrow .bar{flex:1;height:8px}
  .mrow .bar>i{background:var(--mint);transition:width .5s ease}
  .mrow .cnt{font-family:var(--fnt-round);font-weight:800;font-size:11px;color:var(--ink-soft);font-variant-numeric:tabular-nums}

  /* units view */
  .utop{display:flex;align-items:center;gap:12px;margin:6px 2px 16px}
  .utop .ic{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;
    font-family:var(--fnt-round);font-weight:800;font-size:20px;color:#fff}
  .utop h2{font-family:var(--fnt-round);font-weight:800;font-size:20px}
  .utop p{font-size:11.5px;color:var(--ink-soft);font-weight:700}
  .ubtns{display:grid;gap:10px;margin-bottom:18px}
  .ubtn{border:0;cursor:pointer;font-family:var(--fnt-round);font-weight:800;font-size:16px;
    padding:15px 16px;border-radius:16px;display:flex;align-items:center;gap:10px;text-align:left}
  .ubtn small{margin-left:auto;font-size:11px;font-weight:700;opacity:.85}
  .ubtn.main{color:var(--on-primary);background:linear-gradient(140deg,var(--primary),var(--primary-deep));box-shadow:var(--shadow-sm)}
  .ubtn.rev{background:var(--gold-soft);color:var(--ink)}
  .ubtn.rev b{color:var(--gold)}
  .ulist{display:grid;gap:10px}
  .unit{border:0;cursor:pointer;font-family:inherit;color:var(--ink);background:var(--surface);
    border-radius:var(--r-md);padding:14px 16px;box-shadow:var(--shadow-sm);text-align:left;
    display:flex;flex-direction:column;gap:8px;transition:transform .1s}
  .unit:active{transform:scale(.98)}
  .unit .un{display:flex;align-items:center;gap:8px;font-weight:800;font-size:14px}
  .unit .un .st{margin-left:auto;font-size:11px;font-weight:800;color:var(--mint-ink);background:var(--mint-soft);
    padding:3px 9px;border-radius:999px}
  .unit .un .st.zero{color:var(--ink-soft);background:var(--tint)}

  /* quiz */
  #view-quiz{flex:1; display:flex; flex-direction:column}
  .qtop{display:flex;align-items:center;gap:10px;margin:6px 2px 14px}
  .iconbtn{width:40px;height:40px;flex:0 0 auto;border:0;border-radius:12px;background:var(--surface);
    box-shadow:var(--shadow-sm);cursor:pointer;color:var(--ink);display:grid;place-items:center}
  .iconbtn svg{width:20px;height:20px}
  .dots{display:flex;gap:5px;flex:1;align-items:center}
  .dots i{height:7px;flex:1;border-radius:999px;background:var(--tint);transition:background .3s}
  .dots i.done{background:var(--mint)}
  .dots i.cur{background:var(--primary)}
  .qsubj{font-size:11px;font-weight:800;color:var(--ink-soft);letter-spacing:.08em;white-space:nowrap}

  .qcard{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow);padding:24px 20px;
    display:flex;flex-direction:column;align-items:center;text-align:center;gap:16px}
  .qcard .tag{font-size:11px;font-weight:800;letter-spacing:.06em;color:var(--primary-deep);
    background:var(--tint);padding:5px 12px;border-radius:999px}
  .qtext{font-weight:800;font-size:23px;line-height:1.35;text-wrap:balance;font-family:var(--fnt-round)}
  .speak{display:inline-flex;align-items:center;gap:8px;border:2px solid var(--primary);color:var(--primary-deep);
    background:var(--surface);font-family:inherit;font-weight:800;font-size:14px;padding:9px 18px;border-radius:999px;cursor:pointer}
  .speak svg{width:18px;height:18px}
  .speak.playing{background:var(--primary);color:var(--on-primary)}
  @keyframes ring{0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--primary) 45%,transparent)}100%{box-shadow:0 0 0 16px transparent}}
  .speak.playing{animation:ring 1s ease-out infinite}

  .choices{display:grid;gap:11px;margin-top:20px}
  .choice{position:relative;border:2px solid var(--line);background:var(--surface);color:var(--ink);
    font-family:var(--fnt-round);font-weight:800;font-size:17px;padding:15px 17px;border-radius:16px;cursor:pointer;
    text-align:left;display:flex;align-items:center;gap:12px;transition:transform .1s,border-color .15s,background .15s}
  .choice .key{width:26px;height:26px;flex:0 0 auto;border-radius:8px;background:var(--tint);color:var(--primary-deep);
    display:grid;place-items:center;font-size:13px}
  .choice:active{transform:scale(.98)}
  .choice.correct{border-color:var(--mint);background:var(--mint-soft);color:var(--mint-ink)}
  .choice.correct .key{background:var(--mint);color:#fff}
  .choice.wrong{border-color:var(--primary);background:var(--tint);opacity:.9}
  .choice[disabled]{cursor:default}
  .choice .mk{margin-left:auto;font-size:20px}

  .fb{margin-top:18px;border-radius:var(--r-md);padding:15px 16px;display:flex;gap:12px;align-items:center;
    opacity:0;transform:translateY(8px);transition:opacity .25s,transform .25s}
  .fb.show{opacity:1;transform:none}
  .fb.good{background:var(--mint-soft);color:var(--mint-ink)}
  .fb.soft{background:var(--tint);color:var(--ink)}
  .fb .miniowl{width:40px;height:40px;flex:0 0 auto}
  .fb .txt{font-weight:800;font-size:14px}
  .fb .txt small{display:block;font-weight:700;font-size:12px;opacity:.85;margin-top:2px}
  .next{margin-top:16px;width:100%;border:0;cursor:pointer;font-family:var(--fnt-round);font-weight:800;font-size:17px;
    color:var(--on-primary);padding:16px;border-radius:18px;background:linear-gradient(140deg,var(--primary),var(--primary-deep));
    box-shadow:var(--shadow-sm)}
  .next:active{transform:translateY(2px)}

  #view-done .card{text-align:center}
  .done-owl{width:120px;height:120px;margin:2px auto 4px}
  .done-h{font-family:var(--fnt-round);font-weight:800;font-size:26px;margin-bottom:4px}
  .done-sub{color:var(--ink-soft);font-weight:700;font-size:14px}
  .stats{display:flex;gap:12px;margin:20px 0 6px}
  .stat{flex:1;background:var(--tint);border-radius:var(--r-md);padding:14px 8px}
  .stat b{display:block;font-family:var(--fnt-round);font-weight:800;font-size:26px;color:var(--primary-deep);font-variant-numeric:tabular-nums}
  .stat.mint b{color:var(--mint-ink)}
  .stat.gold b{color:var(--gold)}
  .stat span{font-size:11px;color:var(--ink-soft);font-weight:700}
  .done-msg{margin:16px 0 4px;font-weight:800;font-size:15px}
  .btnrow{display:flex;gap:11px;margin-top:18px}
  .btnrow button{flex:1;border:0;cursor:pointer;font-family:var(--fnt-round);font-weight:800;font-size:16px;padding:15px;border-radius:16px}
  .btn-ghost{background:var(--tint);color:var(--ink)}
  .btn-main{color:var(--on-primary);background:linear-gradient(140deg,var(--primary),var(--primary-deep));box-shadow:var(--shadow-sm)}

  .foot{display:flex;justify-content:center;gap:18px;margin-top:22px}
  .foot button{background:none;border:0;color:var(--ink-soft);font-family:inherit;font-weight:700;font-size:12px;cursor:pointer;
    display:inline-flex;align-items:center;gap:5px}
  .foot button svg{width:14px;height:14px}

  .hidden{display:none!important}
  button:focus-visible,.choice:focus-visible{outline:3px solid var(--primary);outline-offset:2px}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}

  canvas#confetti{position:fixed;inset:0;pointer-events:none;z-index:60}

  .owl .eyeopen{display:block}.owl .eyehappy{display:none}
  .owl.happy .eyeopen{display:none}.owl.happy .eyehappy{display:block}
  @keyframes blink{0%,94%,100%{transform:scaleY(1)}97%{transform:scaleY(.1)}}
  .owl .eyes{transform-origin:center;transform-box:fill-box;animation:blink 5.5s infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .bob{animation:bob 3.4s ease-in-out infinite}

  /* ---------- ごほうびスタンプシート ---------- */
  .reward{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow);padding:18px 18px 20px;margin-top:16px}
  .reward-top{display:flex;align-items:center;gap:10px;margin-bottom:4px}
  .reward-top h3{font-family:var(--fnt-round);font-weight:800;font-size:15px;margin:0}
  .reward-top .sheets{margin-left:auto;font-family:var(--fnt-round);font-weight:800;font-size:13px;color:var(--gold);
    background:var(--gold-soft);padding:4px 11px;border-radius:999px;display:inline-flex;align-items:center;gap:4px}
  .reward-goal{font-size:12px;font-weight:700;color:var(--primary-deep);margin:2px 0 12px}
  .reward-goal b{font-family:var(--fnt-round)}
  .sheet{display:grid;grid-template-columns:repeat(5,1fr);gap:9px}
  .slot{aspect-ratio:1;border-radius:15px;display:grid;place-items:center;font-size:26px;position:relative;
    background:var(--tint);border:2px dashed var(--line)}
  .slot.filled{border-style:solid;border-color:transparent;
    background:radial-gradient(circle at 50% 38%, color-mix(in srgb,var(--gold) 22%,var(--surface)), var(--surface));
    box-shadow:var(--shadow-sm);animation:stampin .45s cubic-bezier(.2,1.3,.4,1) both}
  .slot.filled.sparkle::after{content:"✨";position:absolute;top:-6px;right:-4px;font-size:14px}
  .slot .no{position:absolute;bottom:4px;font-size:9px;font-weight:800;color:var(--ink-soft);opacity:.5}
  @keyframes stampin{0%{transform:scale(2.4) rotate(-18deg);opacity:0}60%{opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
  .daily{display:flex;align-items:center;gap:8px;margin-top:14px;font-size:12px;font-weight:700;color:var(--ink-soft)}
  .daily .dbar{flex:1;height:9px;border-radius:999px;background:var(--tint);overflow:hidden}
  .daily .dbar>i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--mint),var(--gold));width:0;transition:width .5s}
  .daily .dnum{font-family:var(--fnt-round);font-weight:800;color:var(--mint-ink)}
  /* done画面のスタンプゲット */
  .gotstamp{margin:6px auto 2px;display:flex;flex-direction:column;align-items:center;gap:6px}
  .gotstamp .big{width:76px;height:76px;border-radius:22px;display:grid;place-items:center;font-size:42px;
    background:radial-gradient(circle at 50% 38%, var(--gold-soft), var(--surface));box-shadow:var(--shadow);
    animation:stampin .5s cubic-bezier(.2,1.3,.4,1) both}
  .gotstamp .lbl{font-family:var(--fnt-round);font-weight:800;font-size:14px;color:var(--gold)}
  .gotstamp.none{display:none}
  /* シート完成モーダル */
  .modal{position:fixed;inset:0;z-index:70;display:none;place-items:center;padding:24px;
    background:color-mix(in srgb,var(--ink) 55%,transparent);backdrop-filter:blur(3px)}
  .modal.show{display:grid}
  .modal .box{background:var(--surface);border-radius:26px;box-shadow:var(--shadow);padding:30px 24px;text-align:center;
    max-width:340px;width:100%;animation:stampin .5s cubic-bezier(.2,1.3,.4,1) both}
  .modal .crown{font-size:56px;line-height:1}
  .modal h2{font-family:var(--fnt-round);font-weight:800;font-size:22px;margin:8px 0 4px;color:var(--primary-deep)}
  .modal p{font-size:13.5px;color:var(--ink-soft);font-weight:700;margin:0 0 6px}
  .modal .card-em{font-size:15px;font-weight:800;color:var(--gold);margin:10px 0 18px;font-family:var(--fnt-round)}
  .modal button{border:0;cursor:pointer;font-family:var(--fnt-round);font-weight:800;font-size:16px;padding:14px 28px;border-radius:16px;
    color:var(--on-primary);background:linear-gradient(140deg,var(--primary),var(--primary-deep));box-shadow:var(--shadow-sm)}
</style>

<div class="app">
  <header class="hud">
    <button class="brand" onclick="go('home')" aria-label="ホームへ">
      <span id="brand-owl" style="width:34px;height:34px;display:inline-block"></span>
      <span><b>みみずく</b><small>MIMIZUKU</small></span>
    </button>
    <span class="pill streak" title="れんぞく日数">🔥<span id="hud-streak">0</span></span>
    <span class="pill points" title="ポイント"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" fill="currentColor" opacity=".2"/><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M12 7v10M9 9.5h4.2a1.8 1.8 0 010 3.6H9m0 0h4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><span id="hud-points">0</span></span>
  </header>

  <!-- HOME -->
  <section id="view-home">
    <div class="card hero">
      <div class="owlwrap bob"></div>
      <div class="speech" id="home-msg"></div>
      <div class="lvrow">
        <div class="lvbadge"><small>レベル</small><span id="home-lv">1</span></div>
        <div class="lvmeter">
          <div class="lbl"><span>つぎのレベルまで</span><span id="home-lvtxt">0 / 100</span></div>
          <div class="bar"><i id="home-lvbar"></i></div>
        </div>
      </div>
      <button class="cta" onclick="startSession({type:'mix'})">きょうの15分をはじめる<span class="sub">5教科ミックス10問 ・ ぜんぶ読み上げつき</span></button>
    </div>

    <div class="reward">

const KEY='mimizuku_v3';
let S=load();
function load(){
  let s=null;
  try{const r=JSON.parse(localStorage.getItem(KEY));if(r&&r.done)s=r;}catch(e){}
  if(!s){
    s={points:0,streak:0,last:'',audio:true,done:{},wrong:{}};
    try{const old=JSON.parse(localStorage.getItem('mimizuku_v2'));
      if(old){s.points=old.points||0;s.streak=old.streak||0;s.last=old.last||'';s.audio=old.audio!==false;}}catch(e){}
  }
  // ごほうびスタンプ関連の後方互換（古い保存にフィールドを足す）
  if(!Array.isArray(s.stamps))s.stamps=[];
  if(typeof s.sheets!=='number')s.sheets=0;
  if(typeof s.dayKey!=='string')s.dayKey='';
  if(typeof s.dayStamps!=='number')s.dayStamps=0;
  return s;
}
const STAMP_EM=['🦉','⭐','🌸','👑','🌈','🎀','🍀','🎵','🧁','💎'];
const DAILY_GOAL=3;
function save(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function levelOf(p){return Math.floor(p/100)+1;}
function doneCount(subj){let n=0;for(const q of ALLQ)if(q.subj===subj&&S.done[q.qid])n++;return n;}
function wrongList(subj){return ALLQ.filter(q=>S.wrong[q.qid]&&(!subj||q.subj===subj));}

/* ---------- 読み上げ ---------- */
let voices=[];
function loadVoices(){try{voices=speechSynthesis.getVoices();}catch(e){}}
if('speechSynthesis' in window){loadVoices();speechSynthesis.onvoiceschanged=loadVoices;}
function pickVoice(lang){const l=lang.slice(0,2);return voices.find(v=>v.lang&&v.lang.toLowerCase().startsWith(l))||null;}
function speak(text,lang){
  if(!S.audio||!('speechSynthesis'in window)||!text)return;
  try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);
    u.lang=lang;u.rate=lang.startsWith('ja')?1.0:0.82;u.pitch=1.05;
    const v=pickVoice(lang);if(v)u.voice=v;
    const b=document.getElementById('q-speak');
    u.onstart=()=>b&&b.classList.add('playing');
    u.onend=()=>b&&b.classList.remove('playing');
    speechSynthesis.speak(u);}catch(e){}
}
function mathSay(s){
  return s.replace(/\(−/g,'(マイナス').replace(/−/g,'ひく')
    .replace(/×/g,'かける').replace(/÷/g,'わる').replace(/\+/g,'たす')
    .replace(/=/g,'イコール').replace(/√/g,'ルート')
    .replace(/²/g,'の2じょう').replace(/³/g,'の3じょう')
    .replace(/x/g,'エックス').replace(/y/g,'ワイ').replace(/a/g,'エー').replace(/b/g,'ビー');
}
function sayForQ(item){
  const o=item.opt;
  if(o.say)return o.say;
  if(o.plain)return 'つぎの ことばの よみかたは、どれかな？';
  if(item.subj==='math')return mathSay(item.q);
  if(item.subj==='english'){
    const m=item.q.match(/（(.*?)）/);
    if(m)return m[1]+'。えいごで いうと？';
  }
  return item.q;
}
function enForQ(item){
  const o=item.opt;
  if(o.en)return o.en;
  if(item.subj!=='english')return null;
  if(item.q.includes('___'))return item.q.replace(/_+/g,item.c[0]).replace(/（.*?）/g,'');
  return item.c[0];
}

function syncDaily(){const t=todayStr();if(S.dayKey!==t){S.dayKey=t;S.dayStamps=0;save();}}
// スタンプを1個追加。満杯になったら{full:true}を返す
function addStamp(perfect){
  syncDaily();
  if(S.stamps.length>=10)completeSheet(); // 前回の満杯シートが未確定なら先に確定（アプリを途中で閉じた場合の保険）
  const idx=S.stamps.length; // 0..9 のマスに順番で入る
  S.stamps.push({em:STAMP_EM[idx],sparkle:!!perfect});
  S.dayStamps++;
  const full=(S.stamps.length>=10);
  save();
  return {em:STAMP_EM[idx],full:full};
}

let queue=[],pos=0,uniqueTotal=10,uniqueDone=0,sCorrect=0,sPoints=0,answered=false,lastMode={type:'mix'},requeued,combo=0,sWrong=0;
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function pickTen(pool){
  const unseen=shuffle(pool.filter(q=>!S.done[q.qid]&&!S.wrong[q.qid]));
  const wrongs=shuffle(pool.filter(q=>S.wrong[q.qid]));
  const dones=shuffle(pool.filter(q=>S.done[q.qid]&&!S.wrong[q.qid]));
  let sel=unseen.slice(0,7);
  sel=sel.concat(wrongs.slice(0,10-sel.length>3?3:10-sel.length));
  if(sel.length<10)sel=sel.concat(unseen.slice(7,7+(10-sel.length)));
  if(sel.length<10)sel=sel.concat(wrongs.slice(3,3+(10-sel.length)));
  if(sel.length<10)sel=sel.concat(dones.slice(0,10-sel.length));
  return shuffle(sel).slice(0,10);
}
function startSession(mode){
  lastMode=mode;
  let pool;
  if(mode.type==='mix')pool=ALLQ;
  else if(mode.type==='subj')pool=ALLQ.filter(q=>q.subj===mode.subj);
  else if(mode.type==='unit')pool=ALLQ.filter(q=>q.unit===mode.unit);
  else pool=wrongList(mode.subj);
  let sel=(mode.type==='wrong')?shuffle(pool).slice(0,10):pickTen(pool);
  if(!sel.length){go('home');return;}
  queue=sel;uniqueTotal=sel.length;uniqueDone=0;pos=0;sCorrect=0;sPoints=0;requeued=new Set();combo=0;sWrong=0;
  go('quiz');renderDots();renderQ();
}
function renderDots(){const d=document.getElementById('dots');d.innerHTML='';
  for(let i=0;i<uniqueTotal;i++){const el=document.createElement('i');
    if(i<uniqueDone)el.className='done';else if(i===uniqueDone)el.className='cur';d.appendChild(el);}}
function renderQ(){
  answered=false;
  const item=queue[pos];
  document.getElementById('q-subj').textContent=BANK[item.subj].name;
  document.getElementById('q-tag').textContent=item.unitName;
  document.getElementById('q-text').textContent=item.q.replace(/___/g,'（　）');
  const ch=document.getElementById('choices');ch.innerHTML='';
  const keys=['A','B','C','D'];
  const order=shuffle([0,1,2,3]);
  order.forEach((ci,slot)=>{
    const b=document.createElement('button');b.className='choice';b.dataset.ci=ci;
    const sp1=document.createElement('span');sp1.className='key';sp1.textContent=keys[slot];
    const sp2=document.createElement('span');sp2.textContent=item.c[ci];
    b.appendChild(sp1);b.appendChild(sp2);
    b.onclick=()=>answer(ci,b);ch.appendChild(b);
  });
  const fb=document.getElementById('fb');fb.className='fb';
  const fo=fb.querySelector('.owl');if(fo)fo.classList.remove('happy');
  document.getElementById('nextbtn').classList.add('hidden');
  speak(sayForQ(item),'ja-JP');
}
function replay(){speak(sayForQ(queue[pos]),'ja-JP');}
function answer(ci,btn){
  if(answered)return;answered=true;
  const item=queue[pos],correct=(ci===0);
  document.querySelectorAll('.choice').forEach(n=>{
    n.setAttribute('disabled','');
    const isC=n.dataset.ci==='0';
    if(isC){n.classList.add('correct');const mk=document.createElement('span');mk.className='mk';mk.textContent='◎';n.appendChild(mk);}
    else if(n===btn){n.classList.add('wrong');}
  });
  const fb=document.getElementById('fb'),txt=document.getElementById('fb-txt');
  const fo=fb.querySelector('.owl');if(fo)fo.classList.toggle('happy',correct);
  if(correct){
    combo++;
    fb.classList.add('good','show');
    const comboTag=combo>=2?' <b style="color:var(--gold)">'+combo+'れんぞく！🔥</b>':'';
    txt.innerHTML=GOOD[Math.floor(Math.random()*GOOD.length)]+comboTag+'<small>+10ポイント</small>';
    sCorrect++;sPoints+=10;S.points+=10;
    S.done[item.qid]=1;delete S.wrong[item.qid];save();
    document.getElementById('hud-points').textContent=S.points;
    pop();
  }else{
    combo=0;sWrong++;
    fb.classList.add('soft','show');
    txt.innerHTML=SOFT[Math.floor(Math.random()*SOFT.length)]+'<small>こたえは「'+item.c[0]+'」だよ</small>';
    S.wrong[item.qid]=1;save();
    if(!requeued.has(item.qid)){requeued.add(item.qid);queue.push(item);}
  }
  const en=enForQ(item);
  if(en)setTimeout(()=>speak(en,'en-US'),correct?450:800);
  document.getElementById('nextbtn').classList.remove('hidden');
}
function nextQ(){
  uniqueDone=Math.min(uniqueTotal,uniqueDone+1);
  pos++;
  if(pos>=queue.length){finish();return;}
  renderDots();renderQ();window.scrollTo(0,0);
}
function quitSession(){
  try{speechSynthesis.cancel();}catch(e){}
  if(uniqueDone>0||sCorrect>0)finish();else go('home');
}
function finish(){
  const t=todayStr();
  if(S.last!==t){
    const y=new Date();y.setDate(y.getDate()-1);
    const yStr=y.getFullYear()+'-'+(y.getMonth()+1)+'-'+y.getDate();
    S.streak=(S.last===yStr)?S.streak+1:1;S.last=t;
  }
  // セットを「やりきった」ときだけスタンプ1個（早めにやめた時は付かない）
  const completed=(uniqueDone>=uniqueTotal);
  let sheetFull=false, gotEm=null;
  const got=document.getElementById('gotstamp');
  if(completed){
    const perfect=(sWrong===0);
    const res=addStamp(perfect);
    gotEm=res.em;sheetFull=res.full;
    got.classList.remove('none');
    document.getElementById('gotstamp-em').textContent=res.em;
    got.querySelector('.lbl').textContent=perfect?'キラキラ スタンプ ゲット！✨':'スタンプ ゲット！';
  }else{
    got.classList.add('none');
  }
  save();
  document.getElementById('d-correct').textContent=sCorrect;
  document.getElementById('d-points').textContent=sPoints;
  document.getElementById('d-streak').textContent=S.streak;
  document.getElementById('done-sub').textContent='きょうは '+Math.max(uniqueDone,1)+'問 に ちょうせん！';
  document.getElementById('done-msg').textContent=DONEMSG[Math.floor(Math.random()*DONEMSG.length)];
  const de=document.querySelector('#view-done .owl');if(de)de.classList.add('happy');
  go('done');confetti();
  speak(sCorrect>=uniqueTotal*0.7?'すごい、よくできたね！':'よくがんばったね。','ja-JP');
  if(sheetFull){setTimeout(showSheetModal,900);}
}
function showSheetModal(){
  document.getElementById('modal-card').textContent='ごほうびカード「'+STAMP_EM.join(' ')+'」を てにいれた！';
  document.getElementById('modal-sub').textContent='スタンプ10こ、ぜんぶ集まったよ！（これで '+(S.sheets+1)+'まいめ）';
  document.getElementById('sheet-modal').classList.add('show');
  confetti();
  speak('シート かんせい！すごいね、よくがんばったね！','ja-JP');
}
function closeSheetModal(){
  if(S.stamps.length>=10)completeSheet(); // シートを確定→新品に
  document.getElementById('sheet-modal').classList.remove('show');
  go('home');
}

/* ---------- 演出 ---------- */
const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
function pop(){if(reduce)return;const c=document.querySelector('.qcard');if(!c)return;
  c.animate([{transform:'scale(1)'},{transform:'scale(1.02)'},{transform:'scale(1)'}],{duration:260,easing:'ease-out'});}
function confetti(){
  if(reduce)return;const cv=document.getElementById('confetti');const ctx=cv.getContext('2d');
  cv.width=innerWidth;cv.height=innerHeight;
  const cols=['#EC5A76','#F5A63C','#1EAF95','#8A6BD6','#4C86E0'];
  let ps=[];for(let i=0;i<90;i++)ps.push({x:innerWidth/2,y:innerHeight*0.32,
    vx:(Math.random()-0.5)*9,vy:Math.random()*-11-3,g:0.32,
    s:6+Math.random()*6,r:Math.random()*6.28,vr:(Math.random()-0.5)*0.4,
    c:cols[i%cols.length],life:1});
  let t=0;function fr(){t++;ctx.clearRect(0,0,cv.width,cv.height);let alive=false;
    ps.forEach(p=>{p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.r+=p.vr;p.life-=0.007;
      if(p.y<cv.height+20&&p.life>0){alive=true;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r);
        ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.c;ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6);ctx.restore();}});
    if(alive&&t<160)requestAnimationFrame(fr);else ctx.clearRect(0,0,cv.width,cv.height);}
  requestAnimationFrame(fr);
}

/* ---------- 設定 ---------- */
function toggleAudio(){S.audio=!S.audio;save();if(S.audio)speak('読み上げ、オンにしたよ','ja-JP');renderHome();}
function toggleTheme(){const cur=document.documentElement.getAttribute('data-theme');
  const dark=cur?cur==='dark':matchMedia('(prefers-color-scheme:dark)').matches;
  document.documentElement.setAttribute('data-theme',dark?'light':'dark');}
function resetAll(){if(confirm('ポイント・れんぞく日数・クリア記録・スタンプを さいしょから にする？')){
  S={points:0,streak:0,last:'',audio:S.audio,done:{},wrong:{},stamps:[],sheets:0,dayKey:'',dayStamps:0};save();renderHome();}}

/* ---------- 起動 ---------- */
go('home');

</script>
